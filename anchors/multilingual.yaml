# Multilingual anchor vocabulary — moodmic's default.
#
# Design: many root terms per emotion (a handful of tokens changing rank in
# the vocab noise tail reads as mood churn; hundreds of tokens average it
# out), across en/es/fr/de/it/pt/nl/ru/ja/zh/ko/ar/hi/tr/pl/sv/id. Words the
# tokenizer splits are dropped automatically at load and the readout is
# normalized by the RESOLVED token count per cluster, so this same file
# works across models with different tokenizers. Audit what survives:
#   uv run python scripts/anchor_report.py anchors/multilingual.yaml
#
# Schema: emotion -> [words]  or  emotion -> {words: [...], color: <rich style>}

